<!DOCTYPE HTML>

    <style>
/* =========================
   MINI FRAMEWORK - ALICE IA
   ========================= */

:root {
    --primary: #80B5D1;
    --primary-dark: #5a9bbd;
    --text: #2c3e50;
    --light: #f5f7fa;
    --card-bg: #ffffff;
    --border: #e5e7eb;
}

/* Reset básico */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", sans-serif;
    background: #fafafa;
    color: var(--text);
}

/* ================= NAVBAR ================= */

#header-wrapper {
    background: var(--primary);
    padding: 1.2rem 0;
}

#nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
}

#nav a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    transition: 0.2s;
}

#nav a:hover {
    opacity: 0.8;
}

/* Dropdown */

#nav li {
    position: relative;
}

#nav li ul {
    position: absolute;
    top: 120%;
    left: 0;
    background: white;
    border-radius: 10px;
    padding: 10px 0;
    min-width: 200px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: none;
}

#nav li:hover > ul {
    display: block;
}

#nav li ul a {
    color: var(--text);
    display: block;
    padding: 8px 15px;
}

#nav li ul a:hover {
    background: var(--light);
}

/* Botón nav */

.button {
    background: white;
    color: var(--primary) !important;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
}

/* ================= LAYOUT ================= */

.main-layout {
    max-width: 1200px;
    margin: auto;
    padding: 40px 20px;
}

/* ================= FILTROS ================= */

.filter-bar {
    background: var(--card-bg);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    margin-bottom: 40px;
    text-align: center;
}

.search-input {
    width: 100%;
    max-width: 500px;
    padding: 12px 20px;
    border-radius: 50px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
}

.search-input:focus {
    outline: none;
    border-color: var(--primary);
}

.filter-chips {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.filter-chip {
    padding: 8px 18px;
    border-radius: 20px;
    background: var(--light);
    cursor: pointer;
    font-size: 0.85rem;
    transition: 0.2s;
}

.filter-chip.active {
    background: var(--primary);
    color: white;
}

/* ================= GRID ================= */

#consultorios-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    margin-bottom: 40px;
}

/* ================= CARD ================= */

.center-card {
    background: var(--card-bg);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    transition: 0.2s;
    cursor: pointer;
}

.center-card:hover {
    transform: translateY(-5px);
}

.card-image {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card-title {
    font-weight: 600;
    margin-bottom: 5px;
}

.card-details {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 10px;
}

.tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    margin-right: 5px;
}

.tag-tipo {
    background: #e3f2fd;
    color: #1976d2;
}

.tag-costo {
    background: #e8f5e9;
    color: #2e7d32;
}

/* ================= MAP ================= */

.map-wrapper {
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

#map {
    height: 350px;
}

/* ================= FOOTER ================= */

#footer-wrapper {
    background: var(--light);
    text-align: center;
    padding: 25px;
    font-size: 0.8rem;
    color: #777;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {

    #nav ul {
        flex-direction: column;
        gap: 12px;
    }

    .main-layout {
        padding: 20px;
    }

}
    </style>
</head>
<body class="is-preload">
    <div id="page-wrapper">

        <div id="header-wrapper">
            <div id="header" class="container">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html">Inicio</a></li>

                    <li>
                        <a href="#">Ayuda inmediata</a>
                        <ul>
                            <li>
                                <a href="https://api.whatsapp.com/send?phone=525635164983&text=tengo%20una%20crisis" target="_blank">
                                    Ayuda por WhatsApp
                                </a>
                            </li>
                            <li>
                                <a href="tel:+525524814754">
                                    Línea de Ayuda
                                </a>
                            </li>
                            <li>
                                <a href="tel:+525564214951">
                                    Consejo ciudadano
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li class="break">
                        <a href="centros.html" style="color:white; font-weight:bold;">
                            Centros de Ayuda
                        </a>
                    </li>

                    <li>
                        <a href="../nav-alice-usuarios/login.html">Alice</a>
                    </li>

                    <li>
                        <a href="../nav-alice-usuarios/login.html" class="button">
                            Inicia sesión
                        </a>
                    </li>
                </ul>
            </nav>
            </div>
        </div>

        <div class="main-layout">
            
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Busca por zona (ej. Roma, Centro) o problema...">
                <div class="filter-chips">
                    <span class="filter-chip active" onclick="filtrar('todos', this)">Todos</span>
                    <span class="filter-chip" onclick="filtrar('Presencial', this)">📍 Presencial</span>
                    <span class="filter-chip" onclick="filtrar('Online', this)">💻 Online</span>
                    <span class="filter-chip" onclick="filtrar('Gratuito', this)">💰 Gratuito</span>
                </div>
            </div>

            <h2 class="section-title">Centros Disponibles</h2>
            <div id="consultorios-list">
                <p style="text-align:center;">Cargando...</p>
            </div>

        </div>

        <div id="footer-wrapper">

    </div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    // 1. PEGAR TU CONFIGURACIÓN OTRA VEZ AQUÍ
    const firebaseConfig = {
  apiKey: "AIzaSyCq2lQnID4SSkFIKh_ja6paB4aHuq4KU0M",
  authDomain: "proyectercerparcial.firebaseapp.com",
  projectId: "proyectercerparcial",
  storageBucket: "proyectercerparcial.appspot.com",
  messagingSenderId: "39792129165",
  appId: "1:39792129165:web:631ce9e0c7fb657a135ec4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Variables globales para usar en el filtrado
    let centros = []; 
    var map = L.map('map').setView([19.4326, -99.1332], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    let markers = [];
    const listaContainer = document.getElementById('consultorios-list');

    // 2. Función principal: Cargar desde Firebase
    async function cargarCentrosDesdeFirebase() {
        listaContainer.innerHTML = '<p style="text-align:center;">Cargando datos de Alice...</p>';
        
        try {
            const querySnapshot = await getDocs(collection(db, "consultorios"));
            
            centros = []; // Limpiamos array
            querySnapshot.forEach((doc) => {
                // Juntamos el ID con los datos
                centros.push({ id: doc.id, ...doc.data() });
            });

            if(centros.length === 0) {
                listaContainer.innerHTML = '<p style="text-align:center;">Aún no hay centros registrados.</p>';
            } else {
                renderizarCentros(centros);
            }

        } catch (error) {
            console.error("Error cargando:", error);
            listaContainer.innerHTML = '<p style="text-align:center; color:red;">Error al cargar datos. Revisa tu conexión.</p>';
        }
    }

    // 3. Renderizado (Igual que antes pero usando datos reales)
    window.renderizarCentros = function(datos) {
        listaContainer.innerHTML = "";
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        datos.forEach(centro => {
            const card = document.createElement('div');
            card.className = 'center-card';
            card.onclick = () => verEnMapa(centro.lat, centro.lng);
            
            card.innerHTML = `
                <img src="${centro.img}" class="card-image" onerror="this.src='../images/placeholder.jpg'">
                <div class="card-content">
                    <div class="card-title">${centro.nombre}</div>
                    <div class="card-details">📍 ${centro.direccion}<br>🕒 ${centro.horario}</div>
                    <div class="tags">
                        <span class="tag tag-tipo">${centro.tipo}</span>
                        <span class="tag tag-costo">${centro.costo}</span>
                    </div>
                </div>
            `;
            listaContainer.appendChild(card);

            if(centro.lat && centro.lng) {
                const marker = L.marker([centro.lat, centro.lng]).addTo(map)
                    .bindPopup(`<b>${centro.nombre}</b><br>${centro.direccion}`);
                markers.push(marker);
            }
        });
    };

    // 4. Funciones de Utilidad (Globales)
    window.verEnMapa = function(lat, lng) {
        document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
        setTimeout(() => { map.setView([lat, lng], 16); }, 500);
    };

    window.filtrar = function(criterio, btn) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        
        if(criterio === 'todos') renderizarCentros(centros);
        else renderizarCentros(centros.filter(c => c.tipo === criterio || c.costo === criterio));
    };

    // Evento buscador
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        const txt = e.target.value.toLowerCase();
        renderizarCentros(centros.filter(c => 
            c.nombre.toLowerCase().includes(txt) || 
            c.direccion.toLowerCase().includes(txt)
        ));
    });

    // INICIAR
    cargarCentrosDesdeFirebase();

</script>
</body>
</html>
