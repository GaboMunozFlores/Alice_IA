<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Psicólogo</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

    <!-- SweetAlert (funcionalidad original) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS del código de referencia -->
    <link rel="stylesheet" href="styles_registr.css">

    <style>
        /* Fondo gris claro */
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        /* Hacer el formulario más pequeño */
        .form-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
        }

        /* CAMPOS DE ENTRADA MÁS GRANDES Y LIGERAMENTE REDONDOS */
        .form-container input[type="email"],
        .form-container input[type="password"],
        .form-container input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .form-container input[type="email"]:focus,
        .form-container input[type="password"]:focus,
        .form-container input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        /* Contenedor de password con ojo */
        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .password-container input {
            padding-right: 50px;
            margin-bottom: 0;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            color: #666;
            transition: color 0.3s;
        }

        .eye-icon:hover {
            color: #333;
        }

        /* Botones con mismo ancho que inputs y más grandes */
        #loginBtn,
        #googleLogin {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        /* Estilo botón iniciar sesión (como el de referencia) */
        #loginBtn {
            background-color: #007bff;
            color: white;
            border: none;
        }

        #loginBtn:hover {
            background-color: #0056b3;
        }

        /* Estilo botón Google */
        #googleLogin {
            background-color: #ffffff;
            color: #333;
            border: 1px solid #ccc;
            font-weight: normal;
            margin-bottom: 20px;
        }

        #googleLogin:hover {
            background-color: #f5f5f5;
        }

        /* Enlace ¿crear cuenta? más grande y centrado */
        .extra-link {
            text-align: center;
            margin: 20px 0 15px;
        }

        .extra-link a {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .extra-link a:hover {
            text-decoration: underline;
        }

        /* Texto legal centrado y hasta abajo */
        .texto-legal {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            line-height: 1.5;
        }

        .texto-legal a {
            color: #007bff;
            text-decoration: none;
        }

        .texto-legal a:hover {
            text-decoration: underline;
        }

        /* Ajustes para mensajes */
        .mensaje-error, .mensaje-exito {
            text-align: center;
            margin: 15px 0;
            padding: 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <!-- Estructura simplificada pero con toda la funcionalidad -->
    <div class="form-container">
        <h2>Iniciar Sesión</h2>

        <!-- Formulario principal con IDs originales -->
        <form id="login-form" method="post">
            <input id="login-email" name="email" type="email" placeholder="Correo electrónico" required>
            
            <div class="password-container">
                <input id="login-password" name="password" type="password" placeholder="Contraseña" required>
                <span id="togglePasswordLogin" class="eye-icon">👁️</span>
            </div>

            <!-- Mensajes (funcionalidad original) -->
            <p id="loginError" class="mensaje-error" style="display: none; color: red; font-weight: bold;"></p>
            <p id="loginExito" class="mensaje-exito" style="display: none; color: green; font-weight: bold;">✅ Redirigiendo...</p>

            <!-- Botón principal: Cambiado a "Iniciar sesión" -->
            <button id="loginBtn" type="submit">Iniciar sesión</button>
        </form>

        <!-- Botón Google: Texto cambiado y posición abajo -->
        <button id="googleLogin">Iniciar con Google</button>

        <!-- Enlace ¿crear cuenta? más grande y centrado -->
        <p class="extra-link">
            <a href="signin.html">¿crear cuenta?</a>
        </p>

        <!-- Texto legal centrado hasta abajo -->
        <p class="texto-legal">
            Al continuar, aceptas las <a href="#">Condiciones de uso</a> y el <a href="#">Aviso de privacidad</a> de la compañía.
        </p>
    </div>
<!--ya jala pinche CHINGADERAAAAAAAAAAAAAAAAAAAAAAAAA  -->
    <!-- Scripts de funcionalidad original (todos se mantienen) -->
    <script type="module" src="../nav-alice-usuarios/js/loginForm.js"></script>
    <script type="module" src="../nav-alice-usuarios/js/auth_firebase.js"></script>
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/jquery.dropotron.min.js"></script>
    <script src="../assets/js/browser.min.js"></script>
    <script src="../assets/js/breakpoints.min.js"></script>
    <script src="../assets/js/util.js"></script>
    <script src="../main.js" type="module"></script>

    <!-- Script para toggle de contraseña -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePasswordLogin');
            const passwordInput = document.getElementById('login-password');
            
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
                });
            }
        });
    </script>
</body>

</html>
