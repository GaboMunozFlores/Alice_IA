<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Historial Clínico - Alice</title>

  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <style>
    /* RESET GENERAL */
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      background: #f0f8ff; /* Azul pálido como el panel */
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* NAV BAR FULL WIDTH */
    nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #80B5D1 !important;
    padding: 10px 40px !important; /* Añadimos padding a los lados */
    display: flex !important;
    align-items: center; /* Centra todo verticalmente */
    justify-content: space-between; /* Empuja los elementos a los extremos */
    z-index: 1000;
    box-sizing: border-box;
}

/* Para que el menú de links siga centrado en la pantalla */
nav ul {
    display: flex !important;
    gap: 30px !important;
    list-style: none !important;
    margin: 0;
    padding: 20px;
    flex-grow: 1; /* Ocupa el espacio */
    justify-content: center; /* Centra los links */
    margin-left: 150px; /* Compensa el ancho del perfil para que el centro sea real */
}

/* Contenedor del perfil a la derecha */
.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    font-family: Arial, sans-serif;
}

.user-profile span {
    font-size: 14px;
    font-weight: 600;
}

.user-profile img {
    width: 40px;
    height: 40px;
    border-radius: 50%; /* Foto circular */
    object-fit: cover;
    border: 2px solid white;
    background-color: #eee;
}
    nav ul li a {
      color: white !important;
      text-decoration: none !important;
      font-size: 16px !important;
      font-weight: 600;
    }

    /* CONTENEDOR PRINCIPAL */
    .container { 
      max-width: 900px; 
      margin: 100px auto 40px; /* Margen superior para no quedar bajo el nav */
      background: #fff; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    h2 { color: #008080; margin-bottom: 20px; }
    .muted { color: #666; font-size: 14px; }

    /* FORMULARIO */
    .form-new-session {
      background: #f9fbfd; 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid #e0e6ed;
      margin: 20px 0; 
      display: none;
    }

    label { font-weight: 600; display: block; margin: 10px 0 5px; color: #333; }
    input, textarea, select {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
      box-sizing: border-box; background: #fff;
    }

    button {
      padding: 12px 20px; background: #80B5D1; color: #fff; border: none; 
      border-radius: 8px; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #6a9bb8; }

    /* TARJETAS AGRUPADAS */
    .paciente-group-card {
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .paciente-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: #fff;
    }

    .paciente-header:hover { background: #f8fbff; }

    .paciente-header h3 { margin: 0; color: #008080; font-size: 18px; }

    .badge-sesiones {
      background: #80B5D1; color: white; padding: 4px 12px; 
      border-radius: 20px; font-size: 12px;
    }

    .detalle-sesiones {
      display: none;
      background: #f0f4f8;
      padding: 15px;
      border-top: 1px solid #eee;
    }

    .sesion-item {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #80B5D1;
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="/nav-alice-psicologo/perfilPsic.html">Inicio</a></li>
      <li><a href="../nav-alice-centros/centros.html">Centros de Ayuda</a></li>
    </ul>

    <div class="user-profile">
     <a href="/nav-alice-psicologo/perfilPsic.html"><span id="navNombrePsicologo">Cargando...</span></a> 
    </div>
</nav>

  <div class="container">
    <h2>Historial Clínico</h2>
    <p><strong>Psicólogo:</strong> <span id="nombrePsicologo" class="muted">Cargando...</span></p>

    <button id="btnNuevaSesion">➕ Nueva sesión</button>

    <div class="form-new-session" id="nuevaSesionForm">
      <h3>Registrar Sesión</h3>
      <label>Paciente</label>
      <select id="selectPaciente"><option>Cargando...</option></select>
      
      <label>Motivo</label>
      <input id="motivo" type="text">
      
      <label>Notas</label>
      <textarea id="notas"></textarea>
      
      <label>Diagnóstico</label>
      <input id="diagnostico" type="text">

      <div style="margin-top:15px; display:flex; gap:10px;">
        <button id="guardarSesion">Guardar Sesión</button>
        <button id="cancelarSesion" style="background:#ccc; color:#333;">Cancelar</button>
      </div>
    </div>

    <h3 style="margin-top:30px; color:#444;">Pacientes Registrados</h3>
    <div id="listaSesiones"></div>
  </div>

  <script src="historial_clinico.js"></script>
</body>
</html>
